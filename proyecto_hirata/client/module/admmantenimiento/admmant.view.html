<!DOCTYPE html>
<html lang="es">
<head>
	<!-- Metadatos base y hojas de estilo del módulo -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Hirata - Administración de Mantenimiento</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="../../styles/main.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
	<!-- Barra superior con datos de sesión -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
		<div class="container-fluid">
			<span class="navbar-brand">Hirata</span>
			<div class="d-flex">
				<span class="navbar-text me-3 text-white" id="nombreUsuario"></span>
				<span class="badge text-bg-light me-3 align-self-center" id="personajeBadge"></span>
				<div id="notificationNavSlot" class="me-3 align-self-center"></div>
				<div id="logoutNavSlot" class="me-3 align-self-center"></div>
			</div>
		</div>
	</nav>

	<main class="container-fluid flex-grow-1 p-3 p-md-4">
		<!-- Cascarón inicial para futuras funcionalidades de mantenimiento -->
		<section class="container-fluid px-0">
			<div class="row g-3">
				<div class="col-12">
					<div class="card">
						<div class="card-body">
							<h3 class="h5 mb-1">Administración de Mantenimiento</h3>
						</div>
					</div>
				</div>

				<div class="col-12">
					<div class="card">
						<div class="card-body">
							<p class="text-muted mb-0">Contenido de mantenimiento aquí</p>
						</div>
					</div>
				</div>
			</div>
		</section>
	</main>

	<!-- Pie de página institucional -->
	<footer class="bg-dark text-white text-center py-3 mt-auto">
		<div class="container">
			<p class="mb-0">© 2026 Transportes Hirata. Todos los derechos reservados.</p>
		</div>
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<!-- Control global de sesión/navbar -->
	<script type="module" src="../../app/app.js"></script>
</body>
</html>
